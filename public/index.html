<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="A convenient tip tracker for monitoring revenue and analytics." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TipMinder</title>
  <base href="<%= PUBLIC_URL %>/" />
  <link
    rel="preload"
    href="<%= PUBLIC_URL %>/assets/fonts/Poppins/Poppins-400.woff2"
    as="font"
    type="font/woff2"
    crossorigin="anonymous"
  />
  <link
    rel="preload"
    href="<%= PUBLIC_URL %>/assets/fonts/Poppins/Poppins-500.woff2"
    as="font"
    type="font/woff2"
    crossorigin="anonymous"
  />
  <link
    rel="preload"
    href="<%= PUBLIC_URL %>/assets/fonts/Poppins/Poppins-600.woff2"
    as="font"
    type="font/woff2"
    crossorigin="anonymous"
  />
  <script type="text/javascript" defer>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var redirectRoute = params.get('p');
      if (redirectRoute !== null) {
        var cleanRoute = decodeURIComponent(redirectRoute);
        window.history.replaceState(
          null,
          null,
          window.location.pathname.replace(/\/$/, '') + '/' + cleanRoute + window.location.hash
        );
      }
    })();
  </script>
  <link rel="stylesheet" href="<%= PUBLIC_URL %>/assets/fonts/fonts.css" />
</head>
<body>
<div id="root"></div>
</body>
</html>
